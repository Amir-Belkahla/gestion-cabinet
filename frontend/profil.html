<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Profil — Cabinet Médical</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header"><div class="brand"><span>🏥</span> Cabinet Médical</div></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Tableau de bord</a>
      <a href="patients.html" class="nav-item" data-role="admin,medecin,secretaire"><span class="nav-icon">👤</span> Patients</a>
      <a href="rendez-vous.html" class="nav-item"><span class="nav-icon">📅</span> Rendez-vous</a>
      <a href="consultations.html" class="nav-item"><span class="nav-icon">🩺</span> Consultations</a>
      <a href="ordonnances.html" class="nav-item"><span class="nav-icon">💊</span> Ordonnances</a>
      <a href="utilisateurs.html" class="nav-item" data-role="admin"><span class="nav-icon">👥</span> Utilisateurs</a>
      <a href="notifications.html" class="nav-item"><span class="nav-icon">🔔</span> Notifications</a>
      <a href="profil.html" class="nav-item active"><span class="nav-icon">👤</span> Mon profil</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sb-user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sb-user-name">—</div>
          <div class="user-role" id="sb-user-role">—</div>
        </div>
      </div>
      <button onclick="logout()" class="btn btn-ghost btn-sm w-100 mt-2" style="justify-content:center">🚪 Déconnexion</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h2>Mon Profil</h2></div>
      <div class="topbar-right">
        <button class="notif-btn" onclick="location.href='notifications.html'">🔔<span class="badge-notif" id="notif-badge" style="display:none">0</span></button>
        <span id="top-user-name" style="font-weight:600;font-size:.85rem"></span>
      </div>
    </header>

    <main class="page-content">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">

        <!-- Informations personnelles -->
        <div class="card">
          <div class="card-header"><h4>Informations personnelles</h4></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Nom</label>
              <input type="text" id="p-nom" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Prénom</label>
              <input type="text" id="p-prenom" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="p-email" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Téléphone</label>
              <input type="text" id="p-telephone" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Rôle</label>
              <input type="text" id="p-role" class="form-control" readonly style="background:var(--bg)">
            </div>
            <button class="btn btn-primary" onclick="saveProfil()">💾 Mettre à jour</button>
          </div>
        </div>

        <!-- Changer mot de passe -->
        <div class="card">
          <div class="card-header"><h4>Changer le mot de passe</h4></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Mot de passe actuel</label>
              <input type="password" id="p-old-mdp" class="form-control" autocomplete="current-password">
            </div>
            <div class="form-group">
              <label class="form-label">Nouveau mot de passe</label>
              <input type="password" id="p-new-mdp" class="form-control" autocomplete="new-password">
            </div>
            <div class="form-group">
              <label class="form-label">Confirmer</label>
              <input type="password" id="p-confirm-mdp" class="form-control" autocomplete="new-password">
            </div>
            <button class="btn btn-primary" onclick="changeMdp()">🔒 Modifier</button>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/profil.js"></script>
</body>
</html>
