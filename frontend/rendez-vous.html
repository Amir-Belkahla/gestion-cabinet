<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rendez-vous — Cabinet Médical</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header"><div class="brand"><span>🏥</span> Cabinet Médical</div></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Tableau de bord</a>
      <a href="patients.html" class="nav-item" data-role="admin,medecin,secretaire"><span class="nav-icon">👤</span> Patients</a>
      <a href="rendez-vous.html" class="nav-item active"><span class="nav-icon">📅</span> Rendez-vous</a>
      <a href="consultations.html" class="nav-item"><span class="nav-icon">🩺</span> Consultations</a>
      <a href="ordonnances.html" class="nav-item"><span class="nav-icon">💊</span> Ordonnances</a>
      <a href="utilisateurs.html" class="nav-item" data-role="admin"><span class="nav-icon">👥</span> Utilisateurs</a>
      <a href="notifications.html" class="nav-item"><span class="nav-icon">🔔</span> Notifications</a>
      <a href="profil.html" class="nav-item"><span class="nav-icon">👤</span> Mon profil</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sb-user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sb-user-name">—</div>
          <div class="user-role" id="sb-user-role">—</div>
        </div>
      </div>
      <button onclick="logout()" class="btn btn-ghost btn-sm w-100 mt-2" style="justify-content:center">🚪 Déconnexion</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h2>Rendez-vous</h2></div>
      <div class="topbar-right">
        <button class="notif-btn" onclick="location.href='notifications.html'">🔔<span class="badge-notif" id="notif-badge" style="display:none">0</span></button>
        <span id="top-user-name" style="font-weight:600;font-size:.85rem"></span>
      </div>
    </header>

    <main class="page-content">
      <!-- Filters -->
      <div class="card" style="margin-bottom:1rem">
        <div class="card-body" style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end">
          <div class="form-group" style="margin:0;min-width:160px">
            <label class="form-label">Date</label>
            <input type="date" id="filter-date" class="form-control" onchange="loadRdv()">
          </div>
          <div class="form-group" style="margin:0;min-width:160px" id="filter-medecin-wrap">
            <label class="form-label">Médecin</label>
            <select id="filter-medecin" class="form-select" onchange="loadRdv()">
              <option value="">Tous</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;min-width:140px">
            <label class="form-label">Statut</label>
            <select id="filter-statut" class="form-select" onchange="loadRdv()">
              <option value="">Tous</option>
              <option value="planifie">Planifié</option>
              <option value="confirme">Confirmé</option>
              <option value="annule">Annulé</option>
              <option value="termine">Terminé</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="openRdvModal()" id="btn-new-rdv">➕ Nouveau RDV</button>
        </div>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>Date</th><th>Heure</th><th>Patient</th><th>Médecin</th><th>Motif</th><th>Statut</th><th>Actions</th></tr>
            </thead>
            <tbody id="rdv-tbody">
              <tr><td colspan="7"><div class="loading-overlay"><span class="spinner"></span></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>
</div>

<!-- Modal RDV -->
<div class="modal-overlay" id="modal-rdv" onclick="closeRdvModal(event)">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h4 id="rdv-modal-title">Nouveau Rendez-vous</h4>
      <button class="modal-close" onclick="closeRdvModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="rdv-id">
      <div class="form-row">
        <div class="form-group" id="patient-group">
          <label class="form-label">Patient <span class="req">*</span></label>
          <select id="rdv-patient" class="form-select" required></select>
        </div>
        <div class="form-group">
          <label class="form-label">Médecin <span class="req">*</span></label>
          <select id="rdv-medecin" class="form-select" required></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date <span class="req">*</span></label>
          <input type="date" id="rdv-date" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Heure début <span class="req">*</span></label>
          <input type="time" id="rdv-debut" class="form-control" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Heure fin <span class="req">*</span></label>
          <input type="time" id="rdv-fin" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Motif</label>
          <input type="text" id="rdv-motif" class="form-control" placeholder="ex: Consultation générale">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea id="rdv-notes" class="form-control" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeRdvModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveRdv()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/rendez_vous.js"></script>
</body>
</html>
