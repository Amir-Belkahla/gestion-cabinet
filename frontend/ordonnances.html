<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordonnances — Cabinet Médical</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header"><div class="brand"><span>🏥</span> Cabinet Médical</div></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Tableau de bord</a>
      <a href="patients.html" class="nav-item" data-role="admin,medecin,secretaire"><span class="nav-icon">👤</span> Patients</a>
      <a href="rendez-vous.html" class="nav-item"><span class="nav-icon">📅</span> Rendez-vous</a>
      <a href="consultations.html" class="nav-item"><span class="nav-icon">🩺</span> Consultations</a>
      <a href="ordonnances.html" class="nav-item active"><span class="nav-icon">💊</span> Ordonnances</a>
      <a href="utilisateurs.html" class="nav-item" data-role="admin"><span class="nav-icon">👥</span> Utilisateurs</a>
      <a href="notifications.html" class="nav-item"><span class="nav-icon">🔔</span> Notifications</a>
      <a href="profil.html" class="nav-item"><span class="nav-icon">👤</span> Mon profil</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sb-user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sb-user-name">—</div>
          <div class="user-role" id="sb-user-role">—</div>
        </div>
      </div>
      <button onclick="logout()" class="btn btn-ghost btn-sm w-100 mt-2" style="justify-content:center">🚪 Déconnexion</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h2>Ordonnances</h2></div>
      <div class="topbar-right">
        <button class="notif-btn" onclick="location.href='notifications.html'">🔔<span class="badge-notif" id="notif-badge" style="display:none">0</span></button>
        <span id="top-user-name" style="font-weight:600;font-size:.85rem"></span>
      </div>
    </header>

    <main class="page-content">
      <div class="toolbar">
        <div></div>
        <button class="btn btn-primary" onclick="openOrdModal()" data-role="medecin">
          ➕ Nouvelle ordonnance
        </button>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>Date</th><th>Patient</th><th>Médicaments</th><th>Instructions</th><th>Actions</th></tr>
            </thead>
            <tbody id="ord-tbody">
              <tr><td colspan="5"><div class="loading-overlay"><span class="spinner"></span></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modal Ordonnance -->
<div class="modal-overlay" id="modal-ord" onclick="closeOrdModal(event)">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h4 id="ord-modal-title">Nouvelle Ordonnance</h4>
      <button class="modal-close" onclick="closeOrdModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ord-id">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Patient <span class="req">*</span></label>
          <select id="o-patient" class="form-select" required></select>
        </div>
        <div class="form-group">
          <label class="form-label">Date émission <span class="req">*</span></label>
          <input type="date" id="o-date" class="form-control" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Instructions</label>
        <textarea id="o-instructions" class="form-control"></textarea>
      </div>

      <div style="margin-top:1rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
          <label class="form-label" style="margin:0">Médicaments</label>
          <button type="button" class="btn btn-outline-primary btn-sm" onclick="addMedRow()">+ Ajouter</button>
        </div>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="font-size:.8rem;color:var(--text-light)">
            <th style="padding:.4rem;text-align:left">Nom</th>
            <th style="padding:.4rem;text-align:left">Dosage</th>
            <th style="padding:.4rem;text-align:left">Durée</th>
            <th style="padding:.4rem;text-align:left">Fréquence</th>
            <th></th>
          </tr></thead>
          <tbody id="meds-tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeOrdModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveOrdonnance()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal Détail Ordonnance -->
<div class="modal-overlay" id="modal-ord-view" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h4>Détails Ordonnance</h4>
      <button class="modal-close" onclick="document.getElementById('modal-ord-view').classList.remove('show')">✕</button>
    </div>
    <div class="modal-body" id="ord-view-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('modal-ord-view').classList.remove('show')">Fermer</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/ordonnances.js"></script>
</body>
</html>
