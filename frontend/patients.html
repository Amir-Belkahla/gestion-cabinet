<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patients — Cabinet Médical</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header"><div class="brand"><span>🏥</span> Cabinet Médical</div></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="nav-icon">📊</span> Tableau de bord</a>
      <a href="patients.html" class="nav-item active" data-page="patients"><span class="nav-icon">👤</span> Patients</a>
      <a href="rendez-vous.html" class="nav-item"><span class="nav-icon">📅</span> Rendez-vous</a>
      <a href="consultations.html" class="nav-item"><span class="nav-icon">🩺</span> Consultations</a>
      <a href="ordonnances.html" class="nav-item"><span class="nav-icon">💊</span> Ordonnances</a>
      <a href="utilisateurs.html" class="nav-item" data-role="admin"><span class="nav-icon">👥</span> Utilisateurs</a>
      <a href="notifications.html" class="nav-item"><span class="nav-icon">🔔</span> Notifications</a>
      <a href="profil.html" class="nav-item"><span class="nav-icon">👤</span> Mon profil</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sb-user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sb-user-name">—</div>
          <div class="user-role" id="sb-user-role">—</div>
        </div>
      </div>
      <button onclick="logout()" class="btn btn-ghost btn-sm w-100 mt-2" style="justify-content:center">🚪 Déconnexion</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h2>Patients</h2></div>
      <div class="topbar-right">
        <button class="notif-btn" onclick="location.href='notifications.html'">🔔<span class="badge-notif" id="notif-badge" style="display:none">0</span></button>
        <span id="top-user-name" style="font-weight:600;font-size:.85rem"></span>
      </div>
    </header>

    <main class="page-content">
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" class="form-control" id="search-input" placeholder="Rechercher un patient…" oninput="onSearch()">
        </div>
        <button class="btn btn-primary" onclick="openModal()" data-role="admin,secretaire">
          ➕ Nouveau patient
        </button>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Nom</th><th>Date naiss.</th><th>Sexe</th><th>Téléphone</th><th>Email</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr><td colspan="6"><div class="loading-overlay"><span class="spinner"></span> Chargement…</div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>
</div>

<!-- Modal Patient -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h4 id="modal-title">Nouveau patient</h4>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="patient-id">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nom <span class="req">*</span></label>
          <input type="text" id="p-nom" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Prénom <span class="req">*</span></label>
          <input type="text" id="p-prenom" class="form-control" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date de naissance <span class="req">*</span></label>
          <input type="date" id="p-dob" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Sexe <span class="req">*</span></label>
          <select id="p-sexe" class="form-select">
            <option value="M">Masculin</option>
            <option value="F">Féminin</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input type="tel" id="p-tel" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="p-email" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Adresse</label>
        <input type="text" id="p-adresse" class="form-control">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Groupe sanguin</label>
          <select id="p-sanguin" class="form-select">
            <option value="">—</option>
            <option>A+</option><option>A-</option>
            <option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option>
            <option>O+</option><option>O-</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Allergies</label>
          <input type="text" id="p-allergies" class="form-control" placeholder="ex: Pénicilline">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Antécédents médicaux</label>
        <textarea id="p-antecedents" class="form-control"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="btn-save" onclick="savePatient()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal Dossier -->
<div class="modal-overlay" id="modal-dossier" onclick="closeDossier(event)">
  <div class="modal modal-xl">
    <div class="modal-header">
      <h4>📂 Dossier médical — <span id="dossier-nom"></span></h4>
      <button class="modal-close" onclick="closeDossier()">✕</button>
    </div>
    <div class="modal-body" id="dossier-content">
      <div class="loading-overlay"><span class="spinner"></span></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/patients.js"></script>
</body>
</html>
