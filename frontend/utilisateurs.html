<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilisateurs — Cabinet Médical</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header"><div class="brand"><span>🏥</span> Cabinet Médical</div></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Tableau de bord</a>
      <a href="patients.html" class="nav-item" data-role="admin,medecin,secretaire"><span class="nav-icon">👤</span> Patients</a>
      <a href="rendez-vous.html" class="nav-item"><span class="nav-icon">📅</span> Rendez-vous</a>
      <a href="consultations.html" class="nav-item"><span class="nav-icon">🩺</span> Consultations</a>
      <a href="ordonnances.html" class="nav-item"><span class="nav-icon">💊</span> Ordonnances</a>
      <a href="utilisateurs.html" class="nav-item active" data-role="admin"><span class="nav-icon">👥</span> Utilisateurs</a>
      <a href="notifications.html" class="nav-item"><span class="nav-icon">🔔</span> Notifications</a>
      <a href="profil.html" class="nav-item"><span class="nav-icon">👤</span> Mon profil</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sb-user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sb-user-name">—</div>
          <div class="user-role" id="sb-user-role">—</div>
        </div>
      </div>
      <button onclick="logout()" class="btn btn-ghost btn-sm w-100 mt-2" style="justify-content:center">🚪 Déconnexion</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h2>Utilisateurs</h2></div>
      <div class="topbar-right">
        <button class="notif-btn" onclick="location.href='notifications.html'">🔔<span class="badge-notif" id="notif-badge" style="display:none">0</span></button>
        <span id="top-user-name" style="font-weight:600;font-size:.85rem"></span>
      </div>
    </header>

    <main class="page-content">
      <div class="toolbar">
        <div class="filters-group">
          <select id="f-role" class="form-select" onchange="loadUtilisateurs()" style="width:160px">
            <option value="">Tous les rôles</option>
            <option value="admin">Admin</option>
            <option value="medecin">Médecin</option>
            <option value="secretaire">Secrétaire</option>
            <option value="patient">Patient</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="openUtilModal()">➕ Nouvel utilisateur</button>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>Nom</th><th>Email</th><th>Rôle</th><th>Statut</th><th>Actions</th></tr>
            </thead>
            <tbody id="util-tbody">
              <tr><td colspan="5"><div class="loading-overlay"><span class="spinner"></span></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>
</div>

<!-- Modal Utilisateur -->
<div class="modal-overlay" id="modal-util" onclick="closeUtilModal(event)">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h4 id="util-modal-title">Nouvel Utilisateur</h4>
      <button class="modal-close" onclick="closeUtilModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="util-id">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nom <span class="req">*</span></label>
          <input type="text" id="u-nom" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Prénom <span class="req">*</span></label>
          <input type="text" id="u-prenom" class="form-control" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email <span class="req">*</span></label>
          <input type="email" id="u-email" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input type="text" id="u-telephone" class="form-control">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Rôle <span class="req">*</span></label>
          <select id="u-role" class="form-select" onchange="toggleRoleFields()" required>
            <option value="">Choisir…</option>
            <option value="admin">Admin</option>
            <option value="medecin">Médecin</option>
            <option value="secretaire">Secrétaire</option>
            <option value="patient">Patient</option>
          </select>
        </div>
        <div class="form-group" id="field-mdp">
          <label class="form-label">Mot de passe <span class="req">*</span><small id="mdp-hint"> (laisser vide pour conserver)</small></label>
          <input type="password" id="u-mdp" class="form-control" autocomplete="new-password">
        </div>
      </div>

      <!-- Champs médecin -->
      <div id="medecin-fields" style="display:none">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Spécialité <span class="req">*</span></label>
            <input type="text" id="u-specialite" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">N° Ordre</label>
            <input type="text" id="u-num-ordre" class="form-control">
          </div>
        </div>
      </div>

      <!-- Champs patient -->
      <div id="patient-fields" style="display:none">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date de naissance</label>
            <input type="date" id="u-dob" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Sexe</label>
            <select id="u-sexe" class="form-select">
              <option value="">—</option>
              <option value="M">Masculin</option>
              <option value="F">Féminin</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Adresse</label>
          <input type="text" id="u-adresse" class="form-control">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeUtilModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveUtilisateur()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/utilisateurs.js"></script>
</body>
</html>
